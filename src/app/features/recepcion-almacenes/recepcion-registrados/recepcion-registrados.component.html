<div class="card">

  <h3>Registrados</h3>

  <br><br>
  @if (loading) {
    <div class="flex justify-content-center py-6">

      <p-progressSpinner></p-progressSpinner>

    </div>
  } @else {
    <p-table
      [value]="registrados"
      [paginator]="true"
      [rows]="10">

      <ng-template pTemplate="header">
        <tr>
          <th>Id</th>
          <th>Usuario</th>
          <th>observacion</th>
          <th>Fecha</th>
          <th>Almacen</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-crepo>
        <tr>
          <td>{{ crepo.id.codigo }}</td>
          <td>{{ crepo.usuario }}</td>
          <td>{{ crepo.observacion }}</td>
          <td>{{ crepo.fecha | date:'mediumDate' }}</td>
          <td>{{ crepo.almacen.nombre}}</td>
        </tr>
      </ng-template>

      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="14" class="empty-state">
            <i class="pi pi-inbox" style="font-size: 2.5rem; color: var(--text-color-secondary);"></i>
            <p>No hay pedidos para mostrar</p>
          </td>
        </tr>
      </ng-template>

    </p-table>

    <br>

    <p-button
      label="Procesar seleccionados"
      icon="pi pi-check"
    >
    </p-button>
  }

</div>
