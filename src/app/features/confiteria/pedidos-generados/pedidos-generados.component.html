```html
<div class="min-h-screen surface-ground px-4 py-5">

  <!-- Header -->
  <div class="flex align-items-center gap-3 mb-5">
    <div class="flex align-items-center justify-content-center border-circle bg-primary" style="width:2.5rem;height:2.5rem">
      <i class="pi pi-shopping-cart text-white text-lg"></i>
    </div>
    <div>
      <p class="text-500 text-xs font-medium uppercase tracking-widest m-0">Gestión de compras</p>
      <h2 class="text-900 font-semibold text-xl m-0">Pedidos Generados</h2>
    </div>
  </div>

  <!-- Filtros -->
  <div class="surface-card border-round-xl border-1 border-200 shadow-1 px-4 py-4 mb-4">
    <div class="flex align-items-center gap-2 mb-4">
      <i class="pi pi-filter text-400 text-sm"></i>
      <span class="text-500 text-xs font-medium uppercase tracking-widest">Consulta por fechas</span>
    </div>
    <div class="grid formgrid align-items-end" (keydown.enter)="find()">
      <div class="col-12 lg:col-4 mb-3 lg:mb-0 flex flex-column gap-2">
        <label class="text-700 text-sm font-semibold">Fecha Inicio</label>
        <p-calendar
          dateFormat="dd-mm-yy"
          inputId="fechaInicio"
          [(ngModel)]="fechaInicio"
          [showIcon]="true"
          styleClass="w-full"/>
      </div>
      <div class="col-12 lg:col-4 mb-3 lg:mb-0 flex flex-column gap-2">
        <label class="text-700 text-sm font-semibold">Fecha Fin</label>
        <p-calendar
          dateFormat="dd-mm-yy"
          inputId="fechaFin"
          [(ngModel)]="fechaFin"
          [showIcon]="true"
          styleClass="w-full"/>
      </div>
      <div class="col-12 lg:col-4 mb-3 lg:mb-0">
        <p-button
          label="Buscar"
          icon="pi pi-search"
          styleClass="w-full"
          (onClick)="find()"/>
      </div>
    </div>
  </div>

  <!-- Tabla -->
  <div class="surface-card border-round-xl border-1 border-200 shadow-1 overflow-hidden">
    <p-table
      [value]="reposiciones"
      responsiveLayout="scroll"
      [paginator]="true"
      [rows]="10"
      [rowsPerPageOptions]="[10,20,30]"
      dataKey="id"
      styleClass="p-datatable-sm p-datatable-striped">

      <ng-template pTemplate="header">
        <tr>
          <th class="surface-100">Orden</th>
          <th class="surface-100">
            <div class="flex align-items-center gap-1">
              <i class="pi pi-calendar text-400 text-sm"></i> Fecha
            </div>
          </th>
          <th class="surface-100">
            <div class="flex align-items-center gap-1">
              <i class="pi pi-building text-400 text-sm"></i> Proveedor
            </div>
          </th>
          <th class="surface-100">
            <div class="flex align-items-center gap-1">
              <i class="pi pi-user text-400 text-sm"></i> Usuario
            </div>
          </th>
          <th class="text-center surface-100" style="width:7rem">Acciones</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-repo>
        <tr class="hover:surface-50 transition-colors transition-duration-150">
          <td>
            <span class="font-mono text-sm text-800 bg-primary-50 border-round px-2 py-1">
              # {{ repo.id }}
            </span>
          </td>
          <td class="text-700 text-sm">{{ repo.fecha | date: 'mediumDate' }}</td>
          <td class="text-800 text-sm font-medium">{{ repo.proveedor }}</td>
          <td>
            <div class="flex align-items-center gap-2">
              <p-avatar
                [label]="repo.usuarioSolicitante?.charAt(0)?.toUpperCase()"
                shape="circle"
                size="normal"
                [style]="{width:'32px', height:'32px'}"
                styleClass="bg-primary-100 text-primary font-bold">
              </p-avatar>
              <span class="text-700 text-sm">{{ repo.usuarioSolicitante }}</span>
            </div>
          </td>
          <td class="text-center">
            <p-button
              icon="pi pi-download"
              [text]="true"
              severity="info"
              size="small"
              pTooltip="Descargar PDF"
              tooltipPosition="left"
              (onClick)="decargarPDF(repo)"/>
          </td>
        </tr>
      </ng-template>

      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="5">
            <div class="flex flex-column align-items-center justify-content-center py-8 gap-3 text-500">
              <i class="pi pi-inbox text-5xl text-300"></i>
              <span class="text-sm">No se encontraron pedidos</span>
            </div>
          </td>
        </tr>
      </ng-template>

    </p-table>
  </div>

</div>
```
